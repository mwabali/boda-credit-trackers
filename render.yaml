services:
  - type: web
    name: boda-credit-backend
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_STORAGE_PATH
        value: /var/data/database.sqlite
    disk:
      name: boda-credit-data
      mountPath: /var/data
      sizeGB: 1
