services:
  - type: web
    name: boda-credit-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn 'app:create_app()'
    healthCheckPath: /
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_CONNECT_TIMEOUT_SECONDS
        value: "5"
      - key: AUTO_BOOTSTRAP_DATABASE
        value: "0"
      - key: REQUIRE_DATABASE_ON_STARTUP
        value: "0"
      - key: SMS_WEBHOOK_URL
        sync: false
      - key: SMS_WEBHOOK_TOKEN
        sync: false
      - key: AFRICASTALKING_USERNAME
        value: sandbox
      - key: AFRICASTALKING_API_KEY
        sync: false
      - key: AFRICASTALKING_SMS_URL
        value: https://api.sandbox.africastalking.com/version1/messaging
